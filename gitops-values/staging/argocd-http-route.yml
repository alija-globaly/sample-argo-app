microservice:
  name: argocd-server

  httproute:
    enabled: true
    urlRewriteEnabled: false

    gateway:
      name: "test-argocd-stage-alb-gateway"
      namespace: "gateways-argocd"
      sectionName: "https"

    customHostname:
      enabled: true
      hosts:
        - "argocd.test.agentcis.com"

    httpMultipleRoute:
      paths:
        - "/"

  targetGroupConfiguration:
    enabled: true

    targetServiceName: argocd-server
    targetType: "instance"

    # Optional (only if nodes are labeled correctly)
    nodeSelector:
      enabled: true
      labelName: project
      labelValue: Testing

    healthCheckPath: "/"
    healthCheckProtocol: "HTTP"
    healthCheckPort: "traffic-port"   # ✅ FIXED
    healthCheckInterval: 5
    healthCheckTimeout: 4
    healthyThresholdCount: 2
    unhealthyThresholdCount: 2

    matcher:
      httpCode: "200-399,401-404"