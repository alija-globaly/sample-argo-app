gateway:
  https_mode:
    enabled: true
    k8s_api_gateway:
      name: test-argocd-stage          # will create argocd-stage-alb-gateway
      gatewayClassName: aws-alb-gateway-class
      listener_http_namespaces: "All"
      listener_https_namespaces: "All"
    aws_alb_config:
      name: test-argocd-stage          # AWS LB config
      scheme: internet-facing
      ipAddressType: ipv4
      defaultCertificate: "arn:aws:acm:ap-southeast-2:834033184010:certificate/bd8f64cc-ddbc-4b0e-81c2-fe5d05ceca54"
      additionalCertificates:
        enabled: false
        arns: []
