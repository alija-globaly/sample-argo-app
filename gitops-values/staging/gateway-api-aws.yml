#### reference : https://github.com/kubernetes-sigs/aws-load-balancer-controller/blob/main/helm/aws-load-balancer-controller/values.yaml
# clusterName MUST match subnet tags: kubernetes.io/cluster/<clusterName>=shared|owned
# If you already tagged subnets with another name, change this to match (do not change tags blindly).
clusterName: argo-default-cluster
region: ap-southeast-2

vpcId: vpc-088b623dd6702c325
serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::834033184010:role/Testing-testing-K8s-EC2-IRSA-role"

hostNetwork: true
replicaCount: 1

# resources:
#   limits:
#     cpu: 1000m
#     memory: 1024Mi
#   requests:
#     cpu: 500m
#     memory: 512Mi

# ✅ REQUIRED: Creates webhook deployment + service
# Enable TargetGroupBinding mutator (FIXES your timeout error)
# enableServiceMutatorWebhook: true  # Required for TargetGroupBindings   

######## currently false gareko xu, serivce nai create huna bata lagatar rookyo
enableServiceMutatorWebhook: false
webhookConfig:
  # Port webhook service exposes (your endpoints show 9443)
  webhookBindPort: 9443
  # Don't disable ingress validation (yo on grare service create hudaina)
  disableIngressValidation: true
  
# === Gateway API ===
controllerConfig:
  featureGates:
    ALBGatewayAPI: true
    NLBGatewayAPI: true
  
  

# Prefer control-plane / project nodes (matches typical Testing cluster labels)
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: project
              operator: In
              values:
                - Testing

 


# Optional: Enable additional features
enableShield: false
enableWaf: false
enableWafv2: false

logLevel: info