---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    # Before Gateway (-30) so argocd-server Service is NodePort before ALB/HTTPRoute reconcile
    argocd.argoproj.io/sync-wave: "-35"
  # finalizers:
  #   - resources-finalizer.argocd.argoproj.io/background
spec:
  project: default
  sources:
  - repoURL: "https://github.com/alija-globaly/sample-argo-app.git"
    targetRevision: "main"
    ref: values
  - repoURL: "https://argoproj.github.io/argo-helm"
    targetRevision: "5.51.6" 
    chart: argo-cd
    helm:
      releaseName: argocd
      valueFiles:
        - $values/gitops-values/staging/argocd-app-values.yml
      # Ensures NodePort even if valueFiles merge/ref is wrong (chart default is ClusterIP)
      parameters:
        - name: server.service.type
          value: NodePort
        # - name: server.service.nodePortHttp
        #   value: "30081"
        # - name: server.service.nodePortHttps
        #   value: "30443"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - PrunePropagationPolicy=foreground