################  reference : https://gateway-api.sigs.k8s.io/guides/getting-started/#installing-gateway-api
############### reference : https://gateway-api.sigs.k8s.io/guides/getting-started/
---
# First: Install Gateway API CRDs
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-100"  # Installing crd before aws elb install
  # finalizers:
  #   - resources-finalizer.argocd.argoproj.io/background    
spec:
  project: default  # or 'infra' if you prefer
  source:
    repoURL: https://github.com/kubernetes-sigs/gateway-api.git
    targetRevision: v1.4.1
    path: config/crd/experimental
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
      - PruneLast=true
      - PrunePropagationPolicy=foreground
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-load-balancer-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-100"  # Installing crd before aws elb install
  # finalizers:
  #   - resources-finalizer.argocd.argoproj.io/background      
spec:
  project: default
  info:
  - name: 'Dependencies'
    value: 'ingress-nginx'
  - name: 'Installation Order'
    value: 'Waits for ingress-nginx to be Healthy'

  sources:
    - repoURL: https://aws.github.io/eks-charts
      chart: aws-load-balancer-controller
      targetRevision: 3.0.0
      helm:
        valueFiles:
          - $values/gitops-values/staging/gateway-api-aws.yml

    - repoURL: "https://github.com/alija-globaly/sample-argo-app.git"
      targetRevision: "main"
      ref: values
  ##### taken referenes from repo => https://github.com/todaywasawesome/troubleshooting-argocd/blob/main/example-apps/01-fighting-controllers/app-stuck-syncing-fixed.yaml
  ignoreDifferences:
    # AWS LB Controller creates ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - '.webhooks[]?.clientConfig.caBundle'
    # AWS LB Controller may also create MutatingWebhookConfiguration  
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - '.webhooks[]?.clientConfig.caBundle'
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true 
      - PrunePropagationPolicy=foreground     